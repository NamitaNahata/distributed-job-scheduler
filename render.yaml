databases:
  - name: job-scheduler-db
    databaseName: job_scheduler
    user: job_scheduler
    plan: free

services:
  - type: web
    name: job-scheduler-api
    runtime: node
    rootDir: api
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && npx tsx src/index.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-scheduler-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  - type: worker
    name: job-scheduler-worker
    runtime: node
    rootDir: api
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npx tsx src/worker/index.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-scheduler-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
